name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZIPFORM_DATA_DRIVER: mock
      # Prisma validates both datasource URLs while loading prisma.config.ts,
      # even though client generation and mock-driver tests do not connect.
      DATABASE_URL: "postgresql://zipform:zipform@localhost:5432/zipform_ci"
      DIRECT_URL: "postgresql://zipform:zipform@localhost:5432/zipform_ci"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workspace
        run: pnpm check
