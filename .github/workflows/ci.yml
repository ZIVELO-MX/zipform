name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      ZIPFORM_DATA_DRIVER: mock
      # Prisma validates both datasource URLs while loading prisma.config.ts,
      # even though client generation and mock-driver tests do not connect.
      DATABASE_URL: "postgresql://zipform:zipform@localhost:5432/zipform_ci"
      DIRECT_URL: "postgresql://zipform:zipform@localhost:5432/zipform_ci"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check workspace
        run: pnpm check

  deploy-preview:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel preview configuration
        run: pnpm dlx vercel@54.20.1 pull --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel preview
        run: pnpm dlx vercel@54.20.1 build --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy Vercel preview
        run: pnpm dlx vercel@54.20.1 deploy --prebuilt --token="${{ secrets.VERCEL_TOKEN }}"

  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable Corepack
        run: corepack enable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pull Vercel production configuration
        run: pnpm dlx vercel@54.20.1 pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build Vercel production deployment
        run: pnpm dlx vercel@54.20.1 build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy to Vercel production
        run: pnpm dlx vercel@54.20.1 deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}"
