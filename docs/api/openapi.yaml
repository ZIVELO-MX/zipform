openapi: 3.1.0
info:
  title: Zipform Data API
  version: 1.3.0-draft
  description: |
    Full CRUD access to Zipform platform data: users, projects, missions,
    seasons, episodes, quest items, resources, agents, and API keys.

    Authentication is via Bearer token (agent API key) or browser session cookie.
    If both are present, the Bearer token takes priority.
  contact:
    name: Zivelo Platform
  license:
    name: Proprietary
    identifier: LicenseRef-Zivelo-Proprietary
servers:
  - url: /api/v1
    description: Current Zipform deployment
security:
  - bearerToken: []
  - sessionCookie: []
tags:
  - name: Users
    description: User profile data (no passwords or sessions exposed).
  - name: Agents
    description: Automated agent accounts that act on behalf of the platform.
  - name: API Keys
    description: API key management for agent authentication.
  - name: Projects
    description: TLOZ project metadata with full CRUD.
  - name: Missions
    description: Missions with filters, detail, and full CRUD.
  - name: Seasons
    description: TLOZ seasons.
  - name: Episodes
    description: TLOZ episodes.
  - name: Quest Items
    description: Inventory / quest items with full CRUD.
  - name: Resources
    description: Attached resources (docs, links, notes) with full CRUD.
paths:
  # ── Users ──────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      summary: List or find users
      description: Filters are exact and case-insensitive. Only one filter at a time.
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: email
          in: query
          description: Exact email address.
          schema:
            type: string
            format: email
        - name: username
          in: query
          description: Exact username.
          schema:
            type: string
            minLength: 1
            maxLength: 64
      responses:
        "200":
          description: Matching users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: queryUsers
      summary: Query users by example
      description: Like GET /users but filters are sent in the request body.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                username:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
                cursor:
                  type: string
      responses:
        "200":
          description: Matching users.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get the authenticated user
      description: Resolves the user associated with the Bearer API key or active browser session.
      tags: [Users]
      responses:
        "200":
          description: Authenticated public user profile.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
  /users/{userId}:
    get:
      operationId: getUser
      summary: Get a user by ID
      tags: [Users]
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User found.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Projects ───────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      summary: List TLOZ projects
      tags: [Projects]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: ownerId
          in: query
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ProjectStatus"
      responses:
        "200":
          description: Matching projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createProject
      summary: Create a TLOZ project
      description: name is required; all other fields are optional.
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                description:
                  type: string
                descriptionDetail:
                  type: string
                icon:
                  type: string
                color:
                  type: string
                  pattern: "^#[0-9a-fA-F]{6}$"
                status:
                  $ref: "#/components/schemas/ProjectStatus"
                type:
                  type: string
                ownerId:
                  type: string
                startDate:
                  type: string
                  format: date
                dueDate:
                  type: string
                  format: date
      responses:
        "201":
          description: Project created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /projects/query:
    post:
      operationId: queryProjects
      summary: Query projects by example
      description: Like GET /projects but filters are sent in the request body.
      tags: [Projects]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                ownerId:
                  type: string
                status:
                  $ref: "#/components/schemas/ProjectStatus"
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
                cursor:
                  type: string
      responses:
        "200":
          description: Matching projects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /projects/{projectId}:
    get:
      operationId: getProject
      summary: Get a TLOZ project by ID
      tags: [Projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      responses:
        "200":
          description: Project found.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      operationId: updateProject
      summary: Update a TLOZ project
      tags: [Projects]
      parameters:
        - $ref: "#/components/parameters/ProjectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                descriptionDetail:
                  type: string
                icon:
                  type: string
                color:
                  type: string
                  pattern: "^#[0-9a-fA-F]{6}$"
                status:
                  $ref: "#/components/schemas/ProjectStatus"
                type:
                  type: string
                ownerId:
                  type: string
                startDate:
                  type: string
                  format: date
                dueDate:
                  type: string
                  format: date
      responses:
        "200":
          description: Project updated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Project"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"

  # ── Missions ───────────────────────────────────────────────────────
  /missions:
    get:
      operationId: listMissions
      summary: List or find missions
      description: Supports pagination, text search on title, and filtering by project, owner, status, season, and episode.
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/Limit"
        - $ref: "#/components/parameters/Cursor"
        - name: projectId
          in: query
          schema:
            type: string
        - name: ownerId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/MissionStatus"
        - name: seasonId
          in: query
          schema:
            type: string
        - name: episodeId
          in: query
          schema:
            type: string
        - name: title
          in: query
          description: Case-insensitive partial text search on title.
          schema:
            type: string
      responses:
        "200":
          description: Matching missions with hydrated relations.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createMission
      summary: Create a mission
      description: title and type are required. Omitted ownerId, projectId, and status default to Zibot, the Zivelo project, and later.
      tags: [Missions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, type]
              properties:
                id:
                  type: string
                  description: Optional custom ID (auto-generated if omitted).
                title:
                  type: string
                description:
                  type: string
                  default: ""
                  maxLength: 280
                  description: Short mission summary shown in previews.
                descriptionDetail:
                  type: string
                  default: ""
                  maxLength: 20000
                  description: Full Markdown detail; task items feed checklist metrics.
                icon:
                  type: string
                  default: Sword
                type:
                  $ref: "#/components/schemas/MissionType"
                status:
                  $ref: "#/components/schemas/MissionStatus"
                  default: later
                ownerId:
                  type: string
                  description: Defaults to the authenticated developer for Full Stack Developer callers, otherwise to the Zibot user ID.
                projectId:
                  type: string
                  description: Defaults to the project whose slug is zivelo when omitted.
                seasonId:
                  type: string
                episodeId:
                  type: string
                dueDate:
                  type: string
                  format: date
                startDate:
                  type: string
                  format: date
                completedAt:
                  type: string
                  format: date-time
                blockedReason:
                  type: string
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                  default: 0
                dependencyIds:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                requiredQuestItemIds:
                  type: array
                  uniqueItems: true
                  items:
                    type: string
                resources:
                  type: array
                  items:
                    $ref: "#/components/schemas/ResourceInput"
      responses:
        "201":
          description: Mission created.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/query:
    post:
      operationId: queryMissions
      summary: Query missions by example
      description: Like GET /missions but filters are sent in the request body.
      tags: [Missions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                projectId:
                  type: string
                ownerId:
                  type: string
                status:
                  $ref: "#/components/schemas/MissionStatus"
                seasonId:
                  type: string
                episodeId:
                  type: string
                title:
                  type: string
                limit:
                  type: integer
                  minimum: 1
                  maximum: 100
                  default: 25
                cursor:
                  type: string
      responses:
        "200":
          description: Matching missions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissionListResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}:
    get:
      operationId: getMissionDetail
      summary: Get mission detail by ID
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      responses:
        "200":
          description: Mission detail with checklist, resources, dependencies.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    patch:
      operationId: updateMission
      summary: Update mission fields
      description: "Only the provided fields are updated. When descriptionDetail is provided, Markdown tasks atomically replace the checklist and recalculate progress; the derived progress takes precedence over a supplied progress value. Valid fields: title, description, descriptionDetail, icon, type, status, dueDate, startDate, completedAt, blockedReason, progress, seasonId, episodeId, ownerId, projectId."
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                  maxLength: 280
                descriptionDetail:
                  type: string
                  maxLength: 20000
                  description: Full Markdown detail. Task items atomically replace the checklist and recalculate progress.
                icon:
                  type: string
                type:
                  $ref: "#/components/schemas/MissionType"
                status:
                  $ref: "#/components/schemas/MissionStatus"
                dueDate:
                  type: string
                  format: date
                startDate:
                  type: string
                  format: date
                completedAt:
                  type: string
                  format: date-time
                blockedReason:
                  type: string
                progress:
                  type: integer
                  minimum: 0
                  maximum: 100
                seasonId:
                  type: string
                episodeId:
                  type: string
                ownerId:
                  type: string
                projectId:
                  type: string
      responses:
        "200":
          description: Mission updated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
    delete:
      operationId: deleteMission
      summary: Delete a mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      responses:
        "200":
          description: Mission deleted.
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}/status:
    patch:
      operationId: patchMissionStatus
      summary: Change mission status only
      description: Dedicated endpoint to update just the status field.
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  $ref: "#/components/schemas/MissionStatus"
      responses:
        "200":
          description: Status updated.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}/dependencies:
    post:
      operationId: addMissionDependency
      summary: Add a dependency to a mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dependsOnMissionId]
              properties:
                dependsOnMissionId:
                  type: string
                  description: ID of the mission this mission depends on.
      responses:
        "200":
          description: Dependency added. Returns updated mission detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}/dependencies/{dependencyId}:
    delete:
      operationId: removeMissionDependency
      summary: Remove a dependency from a mission
      tags: [Missions]
      parameters:
        - $ref: "#/components/parameters/MissionId"
        - name: dependencyId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: Dependency removed. Returns updated mission detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}/resources:
    post:
      operationId: addMissionResource
      summary: Add a resource to a mission
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type, title]
              properties:
                type:
                  $ref: "#/components/schemas/ResourceType"
                title:
                  type: string
                url:
                  type: string
                  format: uri
                fileId:
                  type: string
                icon:
                  type: string
      responses:
        "200":
          description: Resource added. Returns updated mission detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}/resources/{resourceId}:
    delete:
      operationId: removeMissionResource
      summary: Remove a resource from a mission
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/MissionId"
        - name: resourceId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: Resource removed. Returns updated mission detail.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/MissionDetail"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "500":
          $ref: "#/components/responses/InternalError"
  /missions/{missionId}/attachments:
    get:
      operationId: listMissionAttachmentGroups
      summary: List the current private screenshot groups for a mission
      description: Returns the current snapshot for each group with short-lived signed read URLs. Object paths and service credentials are never returned.
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      responses:
        "200":
          description: Current attachment groups.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/AttachmentGroup"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: prepareMissionAttachmentBatch
      summary: Prepare a direct-upload screenshot snapshot
      description: Validates the complete snapshot manifest and returns one signed upload URL per image. The API does not receive image bytes.
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachmentManifest"
      responses:
        "200":
          description: Batch prepared. Repeating the same mission, groupKey and sourceRevision is idempotent.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AttachmentBatchPrepared"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
    put:
      operationId: finalizeMissionAttachmentBatch
      summary: Finalize a screenshot snapshot atomically
      description: Verifies every uploaded object, replaces the complete group, removes absent keys, and returns 409 when a newer generation has superseded this batch. Repeating a finalized batch is idempotent.
      tags: [Resources]
      parameters:
        - $ref: "#/components/parameters/MissionId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              required: [uploadBatchId]
              properties:
                uploadBatchId:
                  type: string
                  minLength: 1
                  maxLength: 128
      responses:
        "200":
          description: Snapshot finalized.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/AttachmentGroupResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: The batch belongs to an older generation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
  /missions/{missionId}/quest-items:
