                      $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createAgent
      summary: Create a new agent account
      description: Creates a non-human user with type=agent and a default API key. The raw key is returned only once.
      tags: [Agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, username, email]
              properties:
                name:
                  type: string
                username:
                  type: string
                email:
                  type: string
                  format: email
                role:
                  type: string
                  default: "agent:operative"
      responses:
        "201":
          description: Agent created with default API key.
          content:
            application/json:
              schema:
                type: object
                required: [user, apiKey]
                properties:
                  user:
                    $ref: "#/components/schemas/User"
                  apiKey:
                    $ref: "#/components/schemas/ApiKeyCreateResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /agents/{agentId}/api-keys:
    get:
      operationId: listAgentApiKeys
      summary: List API keys for an agent
      tags: [API Keys]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: API keys for the agent.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/ApiKey"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createAgentApiKey
      summary: Create a new API key for an agent
      description: Generates a new zaf_-prefixed key. The raw key is returned only once.
      tags: [API Keys]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
      responses:
        "201":
          description: API key created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiKeyCreateResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"
  /agents/{agentId}/api-keys/{keyId}:
    delete:
      operationId: revokeAgentApiKey
      summary: Revoke (delete) an API key
      tags: [API Keys]
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
        - name: keyId
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 128
      responses:
        "200":
          description: Key revoked.
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "500":
          $ref: "#/components/responses/InternalError"

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: authjs.session-token
      description: Existing NextAuth browser session. Production may use the secure cookie prefix.
    bearerToken:
      type: http
      scheme: bearer
      bearerFormat: zaf_
      description: |
        Agent API key. Prefix is always `zaf_` followed by 64 hex characters.
        To authenticate, include the header:
        ```
        Authorization: Bearer zaf_<64-hex-chars>
        ```
        If both Bearer token and session cookie are present, the Bearer token takes priority.
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25
    Cursor:
      name: cursor
      in: query
      schema:
        type: string
        minLength: 1
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
    MissionId:
      name: missionId
      in: path
      required: true
      schema:
        type: string
        minLength: 1
        maxLength: 128
  responses:
    BadRequest:
      description: Invalid path or query input.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Unauthorized:
      description: An authenticated session or valid API key is required.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    Forbidden:
      description: The authenticated actor is not permitted to perform this operation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    NotFound:
      description: The requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    InternalError:
      description: Unexpected server error. Details are recorded server-side.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
    ServiceUnavailable:
      description: Private storage is unavailable or not configured.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
  schemas:
    # ── Shared ───────────────────────────────────────────────────────
    ApiError:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: object
          additionalProperties: false
          required: [code, message, requestId]
          properties:
            code:
              type: string
              enum: [INVALID_REQUEST, UNAUTHORIZED, FORBIDDEN, NOT_FOUND, INTERNAL_ERROR, INVALID_ATTACHMENT_MANIFEST, ATTACHMENT_STORAGE_NOT_CONFIGURED, ATTACHMENT_STORAGE_ERROR, attachment_object_missing, attachment_object_invalid, batch_superseded]
            message:
              type: string
            fields:
              type: object
              description: Field-specific guidance for INVALID_REQUEST responses.
              additionalProperties:
                type: string
            requestId:
              type: string

    # ── Users ────────────────────────────────────────────────────────
    User:
      type: object
      additionalProperties: false
      description: Operational profile. Email is omitted for agent:reader; passwords, sessions, API keys, and other authentication secrets are never exposed.
      required: [id, name, username, role, type, avatarUrl]
      properties:
        id:
          type: string
        name:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
          description: Omitted from responses to agent:reader.
        role:
          type: string
        type:
          type: string
          enum: [human, agent]
        avatarUrl:
          type: string
          format: uri
        theme:
          type: string
          enum: [system, light, dark]
    UserListResponse:
      type: object
      additionalProperties: false
      required: [data, nextCursor]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        nextCursor:
          type: [string, "null"]

    # ── Projects ─────────────────────────────────────────────────────
    ProjectStatus:
      type: string
      enum: [planned, active, archived]
    Project:
      type: object
      additionalProperties: false
      required: [id, slug, name, description, color, icon, status, ownerId, startDate]
      properties:
        id:
          type: string
        slug:
          type: string
        name:
          type: string
        description:
          type: string
        descriptionDetail:
          type: string
        color:
          type: string
          pattern: "^#[0-9a-fA-F]{6}$"
        icon:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        ownerId:
          type: string
        startDate:
          type: string
          format: date
        dueDate:
          type: [string, "null"]
          format: date
    ProjectListResponse:
      type: object
      additionalProperties: false
      required: [data, nextCursor]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Project"
        nextCursor:
          type: [string, "null"]

    # ── Missions ─────────────────────────────────────────────────────
    MissionStatus:
      type: string
      enum: [now, next, later, completed, blocked]
    MissionType:
      type: string
      enum: [main_quest, side_quest, farming_quest, exploration_quest]
    Mission:
      type: object
      additionalProperties: false
      required: [id, displayId, title, description, descriptionDetail, icon, type, status, ownerId, progress]
      properties:
        id:
          type: string
        displayId:
          type: string
        title:
          type: string
        description:
          type: string
          maxLength: 280
        descriptionDetail:
          type: string
          maxLength: 20000
        icon:
          type: string
        type:
          $ref: "#/components/schemas/MissionType"
        status:
          $ref: "#/components/schemas/MissionStatus"
        ownerId:
          type: string
        projectId:
          type: string
        seasonId:
          type: string
        episodeId:
          type: string
        dueDate:
          type: string
          format: date
        progress:
          type: integer
          minimum: 0
          maximum: 100
        completedAt:
          type: string
          format: date-time
        blockedReason:
          type: string
    MissionDetail:
      allOf:
        - $ref: "#/components/schemas/Mission"
        - type: object
          required: [checklist, checklistCount, completed, resources]
          properties:
            project:
              $ref: "#/components/schemas/Project"
            dependencies:
              type: array
              items:
                $ref: "#/components/schemas/Mission"
            questItems:
              type: array
              items:
                $ref: "#/components/schemas/QuestItem"
            checklist:
              type: array
              items:
                $ref: "#/components/schemas/ChecklistItem"
            checklistCount:
              type: integer
              minimum: 0
            completed:
              type: integer
              minimum: 0
            resources:
              type: array
              items:
                $ref: "#/components/schemas/Resource"
    MissionListResponse:
      type: object
      additionalProperties: false
      required: [data, nextCursor]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/MissionDetail"
        nextCursor:
          type: [string, "null"]

    # ── Seasons ──────────────────────────────────────────────────────
    Season:
      type: object
      additionalProperties: false
      required: [id, name, version, description, status, startDate]
      properties:
        id:
          type: string
        name:
          type: string
        version:
          type: string
        description:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: [string, "null"]
          format: date

    # ── Episodes ─────────────────────────────────────────────────────
    Episode:
      type: object
      additionalProperties: false
      required: [id, seasonId, name, romanNumber, description, status, startDate]
      properties:
        id:
          type: string
        seasonId:
          type: string
        name:
          type: string
        romanNumber:
          type: string
        description:
          type: string
        status:
          type: string
        startDate:
          type: string
          format: date
        endDate:
          type: [string, "null"]
          format: date

    # ── Quest Items ──────────────────────────────────────────────────
    InventoryStatus:
      type: string
      enum: [locked, unlocked]
    InventoryCategory:
      type: string
      enum: [tool, access, asset, document, other]
    QuestItem:
      type: object
      additionalProperties: false
      required: [id, name, description, icon, status, category]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        icon:
          type: string
        status:
          $ref: "#/components/schemas/InventoryStatus"
        category:
          $ref: "#/components/schemas/InventoryCategory"
        ownerId:
          type: string
        acquiredAt:
          type: string
          format: date
    QuestItemListResponse:
      type: object
      additionalProperties: false
      required: [data, nextCursor]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/QuestItem"
        nextCursor:
          type: [string, "null"]

    # ── Resources ────────────────────────────────────────────────────
    AttachmentFile:
      type: object
      additionalProperties: false
      required: [key, title, fileName, contentType, sizeBytes, width, height]
      properties:
        key:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$"
        title:
          type: string
          minLength: 1
          maxLength: 200
        fileName:
          type: string
          minLength: 1
          maxLength: 200
        contentType:
          type: string
          enum: [image/png, image/jpeg, image/webp]
        sizeBytes:
          type: integer
          minimum: 1
          maximum: 6291456
        width:
          type: integer
          minimum: 1
          maximum: 10000
        height:
          type: integer
          minimum: 1
          maximum: 10000
    AttachmentManifest:
      type: object
      additionalProperties: false
      required: [groupKey, sourceRevision, files]
      properties:
        groupKey:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9._-]{0,63}$"
        sourceRevision:
          type: string
          pattern: "^[0-9a-fA-F]{40}$"
        files:
          type: array
          minItems: 1
          maxItems: 20
          items:
            $ref: "#/components/schemas/AttachmentFile"
    AttachmentUpload:
      allOf:
        - $ref: "#/components/schemas/AttachmentFile"
        - type: object
          required: [storagePath, uploadUrl]
          properties:
            storagePath:
              type: string
            uploadUrl:
              type: string
              format: uri
    AttachmentBatchPrepared:
      type: object
      required: [uploadBatchId, generation, groupKey, sourceRevision, status, uploads]
      properties:
        uploadBatchId:
          type: string
        generation:
          type: integer
          minimum: 1
        groupKey:
          type: string
        sourceRevision:
          type: string
        status:
          type: string
          enum: [prepared, finalized]
        uploads:
          type: array
          items:
            $ref: "#/components/schemas/AttachmentUpload"
    Attachment:
      allOf:
        - $ref: "#/components/schemas/Resource"
        - type: object
          required: [groupKey, externalKey, contentType, sizeBytes, width, height, sourceRevision, url]
          properties:
            groupKey:
              type: string
            externalKey:
              type: string
            contentType:
              type: string
            sizeBytes:
              type: integer
            width:
              type: integer
            height:
              type: integer
            sourceRevision:
              type: string
            url:
              type: string
              format: uri
    AttachmentGroup:
      type: object
      required: [groupKey, sourceRevision, generation, attachments]
      properties:
        groupKey:
          type: string
        sourceRevision:
          type: string
        generation:
          type: integer
        attachments:
          type: array
          items:
            $ref: "#/components/schemas/Attachment"
    AttachmentGroupResult:
      allOf:
        - $ref: "#/components/schemas/AttachmentGroup"
        - type: object
          required: [uploadBatchId, warnings]
          properties:
            uploadBatchId:
              type: string
            warnings:
              type: array
              items:
                type: string
    ResourceType:
      type: string
      enum: [link, document, image, file, note]
    ResourceInput:
      type: object
      additionalProperties: false
      required: [type, title]
      properties:
        type:
          $ref: "#/components/schemas/ResourceType"
        title:
          type: string
        url:
          type: string
          format: uri
        fileId:
          type: string
        icon:
          type: string
    Resource:
      type: object
      additionalProperties: false
      required: [id, type, title]
      properties:
        id:
          type: string
        missionId:
          type: string
        projectId:
          type: string
        questItemId:
          type: string
        type:
          $ref: "#/components/schemas/ResourceType"
        icon:
          type: string
        title:
          type: string
        url:
          type: string
          format: uri
        fileId:
          type: string
        groupKey:
          type: string
        externalKey:
          type: string
        contentType:
          type: string
        sizeBytes:
          type: integer
        width:
          type: integer
        height:
          type: integer
        sourceRevision:
          type: string
    ResourceListResponse:
      type: object
      additionalProperties: false
      required: [data, nextCursor]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Resource"
        nextCursor:
          type: [string, "null"]

    # ── API Keys ─────────────────────────────────────────────────────
    ApiKey:
      type: object
      additionalProperties: false
      required: [id, userId, createdByUserId, name, keyPrefix, createdAt]
      properties:
        id:
          type: string
        userId:
          type: string
        createdByUserId:
          type: string
        name:
          type: string
        keyPrefix:
          type: string
        lastUsedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    ApiKeyCreateResult:
      type: object
      additionalProperties: false
      required: [key, apiKey]
      properties:
        key:
          type: string
          description: "Raw API key (shown only once, begins with zaf_)"
        apiKey:
          $ref: "#/components/schemas/ApiKey"

    # ── Checklist Items ──────────────────────────────────────────────
    ChecklistItem:
      type: object
      additionalProperties: false
      required: [id, missionId, title, completed, position]
      properties:
        id:
          type: string
        missionId:
          type: string
        title:
          type: string
        completed:
          type: boolean
        position:
          type: integer
