      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                descriptionDetail:
                  type: string
                icon:
                  type: string
                status:
                  $ref: "#/components/schemas/InventoryStatus"
                category:
