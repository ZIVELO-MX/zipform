<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  .sb *{box-sizing:border-box}
  .sb .scrl::-webkit-scrollbar{width:9px;height:9px}
  .sb .scrl::-webkit-scrollbar-thumb{background:rgba(29,29,27,0.16);border-radius:999px}
  .sb .scrl::-webkit-scrollbar-thumb:hover{background:rgba(29,29,27,0.28)}
  .sb .scrl::-webkit-scrollbar-track{background:transparent}
  .sb .nav:hover{background:rgba(215,34,40,0.05);outline:1px solid rgba(215,34,40,0.28);outline-offset:-1px}
  .sb .nav.active{background:rgba(215,34,40,0.07);outline:1px solid rgba(215,34,40,0.22);outline-offset:-1px;color:#1D1D1B;font-weight:600}
  .sb .nav.active .lbl{color:#D72228}
  .sb .nav.active svg{stroke:#D72228}
  .sb .acc-head{cursor:pointer;user-select:none;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
  .sb .acc-head:hover .acc-title{color:#6B6B6B}
  .sb .chev{transition:transform .2s ease;flex-shrink:0}
  .sb .acc-head[data-open="false"] .chev{transform:rotate(-90deg)}
  .sb .sbtoggle{cursor:pointer}
  .sb .sbtoggle:hover{background:#EFEFED;color:#D72228}
  .sb.collapsed{width:64px !important}
  .sb.collapsed .lbl,.sb.collapsed .cnt,.sb.collapsed .acc-head,.sb.collapsed .brand,.sb.collapsed .foot-txt,.sb.collapsed .foot-gear{display:none !important}
  .sb.collapsed .nav{justify-content:center;padding-left:0;padding-right:0;gap:0}
  .sb.collapsed .brandrow{justify-content:center;padding-left:0;padding-right:0}
  .sb.collapsed .foot{justify-content:center;padding-left:0;padding-right:0}
  .sb.collapsed .acc-body{padding-left:9px;padding-right:9px}
</style>
</helmet>
<aside class="sb" style="width:248px;flex-shrink:0;background:#fff;border-right:1px solid rgba(29,29,27,0.10);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;transition:width .2s ease;font-family:'Inter',system-ui,sans-serif;color:#1D1D1B;font-size:14px">

  <div class="brandrow" style="padding:18px 14px 14px;display:flex;align-items:center;gap:11px">
    <div style="display:flex;align-items:flex-end;gap:3px;height:24px;flex-shrink:0" title="Logo Zivelo (placeholder)">
      <span style="width:5px;height:14px;background:#1D1D1B;border-radius:2px"></span>
      <span style="width:5px;height:24px;background:#D72228;border-radius:2px"></span>
      <span style="width:5px;height:18px;background:#1D1D1B;border-radius:2px"></span>
      <span style="width:5px;height:10px;background:#D72228;border-radius:2px"></span>
    </div>
    <div class="brand" style="line-height:1.05;flex:1;min-width:0">
      <div style="font-weight:800;font-size:16px;letter-spacing:-0.02em">TLOZ</div>
      <div style="font-size:10.5px;color:#6B6B6B;font-weight:500;margin-top:1px">by Zivelo</div>
    </div>
    <button class="sbtoggle" style="width:30px;height:30px;border-radius:8px;border:1px solid rgba(29,29,27,0.10);background:#F5F5F5;color:#6B6B6B;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s ease" title="Colapsar menú">
      <svg class="togglechev" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s ease"><polyline points="15 18 9 12 15 6"/><line x1="20" y1="6" x2="20" y2="18"/></svg>
    </button>
  </div>

  <button class="acc-head" data-open="true" data-acc="vistas" style="padding:6px 24px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px">

    <a href="TLOZ Board.dc.html" data-nav="board" class="nav" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;text-decoration:none;color:#454543;font-weight:500;font-size:13.5px;cursor:pointer">

    <a href="TLOZ Lista.dc.html" data-nav="lista" class="nav" style="display:flex;align-items:center;gap:11px;height:36px;padding:0 12px;border-radius:9px;text-decoration:none;color:#454543;font-weight:500;font-size:13.5px;cursor:pointer">

      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4.5" width="18" height="17" rx="2"/><line x1="3" y1="9.5" x2="21" y2="9.5"/><line x1="8" y1="2.5" x2="8" y2="6.5"/><line x1="16" y1="2.5" x2="16" y2="6.5"/></svg>
      <span class="lbl">Calendario</span>

  <nav class="acc-body" style="padding:0 12px;display:flex;flex-direction:column;gap:2px">

      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>

      <span class="cnt" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#9a9a98">5</span>

      <span class="lbl">Recursos</span>
    </a>

  <button class="acc-head" data-open="true" data-acc="proyectos" style="padding:14px 24px 8px;display:flex;align-items:center;justify-content:space-between;gap:8px">
    <span class="acc-title" style="font-size:10.5px;font-weight:700;letter-spacing:0.08em;color:#9a9a98;text-transform:uppercase;transition:color .15s ease">Proyectos</span>
    <span style="display:flex;align-items:center;gap:9px">
      <span style="font-size:14px;color:#bcbcba;font-weight:400">+</span>
      <svg class="chev" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#bcbcba" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
    </span>

  <nav class="acc-body scrl" style="padding:0 12px 12px;display:flex;flex-direction:column;gap:1px;overflow:auto;flex:1;min-height:0">
    <a class="nav" style="display:flex;align-items:center;gap:10px;height:32px;padding:0 12px;border-radius:8px;text-decoration:none;color:#1D1D1B;font-weight:600;font-size:13px;cursor:pointer">
      <span style="width:8px;height:8px;border-radius:2px;background:#D72228;flex-shrink:0"></span><span class="lbl">Zivelo</span>
      <span class="cnt" style="margin-left:auto;font-size:10px;color:#9a9a98;font-weight:500;letter-spacing:0.04em">GLOBAL</span>
    </a>
    <a class="nav" style="display:flex;align-items:center;gap:10px;height:32px;padding:0 12px;border-radius:8px;text-decoration:none;color:#454543;font-weight:500;font-size:13px;cursor:pointer">
      <span style="width:8px;height:8px;border-radius:2px;background:#2D6CDF;flex-shrink:0"></span><span class="lbl">Auth</span>
      <span class="cnt" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#9a9a98">8</span>
    </a>
    <a class="nav" style="display:flex;align-items:center;gap:10px;height:32px;padding:0 12px;border-radius:8px;text-decoration:none;color:#454543;font-weight:500;font-size:13px;cursor:pointer">
      <span style="width:8px;height:8px;border-radius:2px;background:#C0397A;flex-shrink:0"></span><span class="lbl">Join Flow</span>
      <span class="cnt" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#9a9a98">6</span>
    </a>
    <a class="nav" style="display:flex;align-items:center;gap:10px;height:32px;padding:0 12px;border-radius:8px;text-decoration:none;color:#454543;font-weight:500;font-size:13px;cursor:pointer">

      <span class="cnt" style="margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:11px;color:#9a9a98">5</span>

    <a class="nav" style="display:flex;align-items:center;gap:10px;height:32px;padding:0 12px;border-radius:8px;text-decoration:none;color:#454543;font-weight:500;font-size:13px;cursor:pointer">

  <div class="foot" style="border-top:1px solid rgba(29,29,27,0.08);padding:12px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0">

  </div>

</aside>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:248,&quot;height&quot;:760},&quot;active&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;dashboard&quot;,&quot;board&quot;,&quot;lista&quot;,&quot;tabla&quot;,&quot;calendario&quot;,&quot;questitems&quot;,&quot;&quot;],&quot;default&quot;:&quot;dashboard&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  componentDidMount() {
    const root = document.querySelector('aside.sb');
    if (!root) return;

    // --- active highlight from prop ---
    const active = this.props.active || '';
    if (active) {
      const link = root.querySelector('[data-nav="' + active + '"]');
      if (link) link.classList.add('active');
    }

    // --- collapse (persisted) ---
    const KEY = 'tloz_sb_collapsed';
    const toggle = root.querySelector('.sbtoggle');
    const togChev = root.querySelector('.togglechev');
    const apply = (on) => {
      root.classList.toggle('collapsed', on);
      if (togChev) togChev.style.transform = on ? 'rotate(180deg)' : 'rotate(0deg)';
      if (toggle) toggle.title = on ? 'Expandir menú' : 'Colapsar menú';
    };
    let collapsed = false;
    try { collapsed = localStorage.getItem(KEY) === '1'; } catch (e) {}
    apply(collapsed);
    if (toggle) toggle.addEventListener('click', () => {
      collapsed = !collapsed;
      apply(collapsed);
      try { localStorage.setItem(KEY, collapsed ? '1' : '0'); } catch (e) {}
    });

    // --- accordions (default open) ---
    root.querySelectorAll('.acc-head').forEach((head) => {
      const body = head.nextElementSibling;
      head.addEventListener('click', () => {
        if (root.classList.contains('collapsed')) return;
        const open = head.getAttribute('data-open') !== 'false';
        head.setAttribute('data-open', open ? 'false' : 'true');
        if (body) body.style.display = open ? 'none' : 'flex';
      });
    });
  }
}
</script>
</body>
</html>
